name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-all:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2
    - name: Install x86 Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        target: x86_64-unknown-linux-gnu
        toolchain: 1.77.0
        default: true
        override: true
        components: rustfmt, clippy
    - name: Install ARM Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        target: thumbv7em-none-eabihf
        toolchain: 1.77.0
        override: true
        components: rustfmt, clippy
    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@main
    - name: Install cargo-make
      run: cargo binstall --no-confirm cargo-make@0.37.24
    - name: Install flip-link
      run: cargo binstall --no-confirm flip-link@0.1.9
    - name: Install taplo-cli
      run: cargo binstall --no-confirm taplo-cli@0.9.3
    - name: Install up Python 3.x toolchain
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install Python black
      run: pip install black
    - name: Run CI
      uses: actions-rs/cargo@v1
      with:
        command: make
        args: ci
